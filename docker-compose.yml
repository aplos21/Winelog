services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${WINELOG_DATABASE_PASSWORD} # Pega do .env
      POSTGRES_DB: winelog_production
    ports:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d winelog_production"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "80:80"
    env_file:        # <-- Adicione estas duas linhas aqui
      - .env         # <-- Para forçar o Docker a ler o arquivo
    environment:
      RAILS_ENV: production
      DATABASE_HOST: db
      WINELOG_DATABASE_PASSWORD: ${WINELOG_DATABASE_PASSWORD} # Injeta no Rails
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
    depends_on:
      db:
        condition: service_healthy
    # O db:prepare vai ler o database.yml e criar os 4 bancos necessários automaticamente
    command: >
      bash -c "./bin/rails db:prepare && ./bin/thrust ./bin/rails server"

volumes:
  postgres_data: