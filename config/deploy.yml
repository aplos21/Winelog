# Nome da sua aplicação
service: winelog

# Nome da imagem no Docker Hub
image: mateusmed31415/winelog

proxy:
  app_port: 3000 # <-- CORRIGIDO: Alinhado com a porta padrão do Rails 8

# Servidor VPS da Oracle Cloud (Vinhedo)
servers:
  web:
    - 157.151.28.170
 

# Onde as imagens do contêiner serão guardadas
registry:
  server: index.docker.io
  username: mateusmed31415
  password:
    - KAMAL_REGISTRY_PASSWORD

# Injeção de variáveis de ambiente de produção
env:
  clear:
    RAILS_ENV: production
    RAILS_LOG_TO_STDOUT: true
    SOLID_QUEUE_IN_PUMA: true
    DB_ADAPTER: postgresql    # <-- Garantindo que use o Postgres
    DB_HOST: host.docker.io   # <-- IP da sua VPS onde o banco vai rodar
    DB_PORT: 5432
    DB_NAME: winelog_production
  secret:
    - RAILS_MASTER_KEY
    - ADMIN_EMAIL
    - DB_USER
    - DB_PASSWORD

# Volumes persistentes para uploads locais do Active Storage
volumes:
  - "winelog_storage:/rails/storage"

# Caminho dos assets (CSS e JS) compilados pelo Propshaft
asset_path: /rails/public/assets

# Usuário padrão das instâncias Ubuntu na Oracle Cloud
ssh:
  user: ubuntu

# Configuração essencial para os processadores Ampere (ARM64) da OCI
builder:
  arch: arm64
  remote: ssh://ubuntu@157.151.28.170
# ADICIONE ESTE BLOCO AQUI PARA ADICIONAR O IP DO HOST NO DOCKER:
boot:
  options:
    add-host: "host.docker.io:host-gateway"

# Atalhos úteis
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f

# CORRIGIDO: Trocado Oracle Database por PostgreSQL (compatível com seu Gemfile)
accessories:
  db:
    image: postgres:16
    roles:
      - web
    env:
      clear:
        POSTGRES_DB: winelog_production
      secret:
        - POSTGRES_USER
        - POSTGRES_PASSWORD
    volumes:
      - "winelog_db_data:/var/lib/postgresql/data"
    port: "5432:5432"